# gltest configuration for the bradbury v3 contract suite.
#
# Run from experiments/bradbury/:
#   gltest tests/integration/ -v -s --network localnet
#   gltest tests/integration/ -v -s --network testnet_bradbury
#
# Schema: gltest >= 0.29.x (paths.contracts + networks.default nested,
# per-network chain_type required).

paths:
  contracts: ../

networks:
  default: localnet

  localnet:
    # GenLayer Studio / GLSim running locally.
    #   genlayer up --headless --numValidators 5    (full Studio + Docker)
    # Default RPC URL is read from the local Studio / GLSim process.
    id: 61999
    url: http://127.0.0.1:4000/api
    chain_type: localnet
    accounts:
      # Default GLSim funded accounts. Override via ACCOUNT_PRIVATE_KEY_1 env
      # if you want to use your own keys against a custom localnet.
      - "${ACCOUNT_PRIVATE_KEY_1:-0x59c6995e998f97a5a0044966f0945389dc9e86dae88c7a8412f4603b6b78690d}"
      - "${ACCOUNT_PRIVATE_KEY_2:-0x5de4111afa1a4b94908f83103eb1f1706367c2e68ca870fc3fb9a804cdab365a}"

  testnet_bradbury:
    # Real GenLayer testnet (Bradbury). Requires funded accounts — set the
    # private keys via env. Never commit raw keys.
    id: 62027
    url: https://genlayer-testnet.rpc.caldera.xyz/http
    chain_type: testnet_bradbury
    accounts:
      - "${ACCOUNT_PRIVATE_KEY_1}"
      - "${ACCOUNT_PRIVATE_KEY_2}"
